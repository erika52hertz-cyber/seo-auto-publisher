service:
  name: "Mimosa Works"
  url: "https://mimosaworks.com"
  platform: "github"
  repo: "REPO_NAME_HERE"  # 要設定
  branch: "main"
  posts_dir: "_posts"
  language: "ja"
  tone: "データ重視・AIテック感・経営者目線・コスト削減訴求"
  cta: "月30分のインタビューだけでコンテンツを自動量産。Mimosa Worksの無料相談はこちら。"

